name: Build and Release Management

on:
  push:
    branches:
      - master
    paths:
      - 'gradle.properties'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Extract and Validate Version
      id: check_version
      run: |
        # Version auslesen
        VERSION=$(grep "^version" gradle.properties | cut -d'=' -f2 | xargs)
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        
        # Prüfen, wie die Version endet
        if [[ "$VERSION" == *-PRE ]]; then
          echo "IS_PRE=true" >> $GITHUB_OUTPUT
          echo "IS_RELEASE=false" >> $GITHUB_OUTPUT
        elif [[ "$VERSION" == *-RELEASE ]]; then
          echo "IS_PRE=false" >> $GITHUB_OUTPUT
          echo "IS_RELEASE=true" >> $GITHUB_OUTPUT
        else
          echo "Version endet weder auf -PRE noch auf -RELEASE. Breche ab."
          exit 1
        fi

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build

    # ==========================================
    # LOGIK FÜR PRE-RELEASE (-PRE)
    # ==========================================
    - name: Create and Push Pre-Release Tag
      if: steps.check_version.outputs.IS_PRE == 'true'
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        TAG_NAME="v${{ env.VERSION }}"
        if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
          echo "Tag $TAG_NAME existiert bereits!"
        else
          git tag -a "$TAG_NAME" -m "Pre-release version ${{ env.VERSION }}"
          git push origin "$TAG_NAME"
        fi

    - name: Release to GitHub (Pre-Release)
      if: steps.check_version.outputs.IS_PRE == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ env.VERSION }}"
        name: "Pre-release v${{ env.VERSION }}"
        prerelease: true
        draft: false
        files: |
          build/libs/*-all.jar
          build/libs/*.jar

    # ==========================================
    # LOGIK FÜR ECHTES RELEASE (-RELEASE)
    # ==========================================
    - name: Create and Push Release Tag
      if: steps.check_version.outputs.IS_RELEASE == 'true'
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        TAG_NAME="v${{ env.VERSION }}"
        if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
          echo "Tag $TAG_NAME existiert bereits!"
        else
          git tag -a "$TAG_NAME" -m "Release version ${{ env.VERSION }}"
          git push origin "$TAG_NAME"
        fi

    - name: Release to GitHub (Full Release)
      if: steps.check_version.outputs.IS_RELEASE == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ env.VERSION }}"
        name: "Release v${{ env.VERSION }}"
        prerelease: false
        draft: false
        files: |
          build/libs/*-all.jar
          build/libs/*.jar
